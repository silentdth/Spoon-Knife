<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>

  <title>Spoon-Knife</title>
  <style type="text/css">
    * {
      margin:0px;
      padding:0px;
    }
    
    #octocat {
      display: block;
      width:384px;
      margin: 50px auto;
    }
    
    p {
      display: block;
      width: 400px;
      margin: 50px auto;
      font: 30px Monaco,"Courier New","DejaVu Sans Mono","Bitstream Vera Sans Mono",monospace;
    }
    #rainbow-message {
      position: absolute;
      right: 10px;
      top: 10px;
      box-shadow: -5px 10px 15px gray;
      -moz-box-shadow: -5px 10px 15px gray;
      font-family: sans-serif;
    }
    
  </style>
  <script type="text/javascript" src="src/konami.js"></script>
  <script type="text/javascript">
	(function() {
		"use strict";

		var handler = createKonamiHandler(function() {
			var msg = document.getElementById("rainbow-message");
			if (msg) {
				msg.style.display = "";
			}
		});

		if (document.addEventListener) {
			document.addEventListener("keydown", handler.keydownHandler, false);
		} else if (window.attachEvent) {
			window.attachEvent("onkeydown", handler.keydownHandler);
		} else {
			window.onkeydown = handler.keydownHandler;
		}
	})();
   </script>
		
</head>

<body>

<img src="forkit.gif" id="octocat" alt="" />

<p>
  Fork me? No, fork you!
</p>
<div id="rainbow-message" style="display:none">
Double repositories all the way across the sky!<br/>
<a href="https://help.github.com/fork-a-repo/">What does it mean?</a>
</div>
</body>
</html>
